{% extends "core/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-10">
    <div class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-gray-800">Welcome back</h1>
        <p class="text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" autofocus required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>

            {% if form.errors %}
            <p class="text-red-500 text-sm mb-4">Invalid username or password.</p>
            {% endif %}

            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
