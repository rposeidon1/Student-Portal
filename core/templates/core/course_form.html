{% extends "core/base.html" %}

{% block title %}Course Form{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-800">{{ form.instance.pk|yesno:"Edit Course,Add Course" }}</h1>
        <p class="text-gray-500 mt-1">Fill in the details below.</p>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Course Title</label>
                {{ form.course_title }}
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                {{ form.description }}
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Duration</label>
                {{ form.duration }}
            </div>

            <div class="flex gap-3">
                <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">Save</button>
                <a href="{% url 'courses_list' %}" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
