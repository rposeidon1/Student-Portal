{% for student in students %}
<tr class="hover:bg-gray-50 transition">
    <td class="px-6 py-3 font-medium text-gray-800">{{ student.name }}</td>
    <td class="px-6 py-3 text-gray-600">{{ student.email }}</td>
    <td class="px-6 py-3 text-gray-600">{{ student.phone }}</td>
    <td class="px-6 py-3 text-gray-600">{{ student.course }}</td>
    <td class="px-6 py-3 flex gap-2">
        <a href="{% url 'student_edit' student.id %}" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded text-xs font-medium hover:bg-indigo-200 transition">Edit</a>
        <a href="{% url 'student_delete' student.id %}" class="bg-red-100 text-red-600 px-3 py-1 rounded text-xs font-medium hover:bg-red-200 transition">Delete</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="px-6 py-4 text-center text-gray-400 text-sm">No students found.</td>
</tr>
{% endfor %}
