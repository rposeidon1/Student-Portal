{% extends "core/base.html" %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Delete Student</h1>
        <p class="text-gray-600 mb-6">Are you sure you want to delete <span class="font-semibold text-red-600">{{ student.name }}</span>? This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex gap-3">
                <button type="submit" class="bg-red-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-red-700 transition">Yes, Delete</button>
                <a href="{% url 'students_list' %}" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
